; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pro8MHzatmega328]
platform = atmelavr
board = pro8MHzatmega328
framework = arduino
; Indispensable pour tes capteurs et le formatage des messages
lib_deps =
    https://github.com/jgromes/RadioLib/archive/refs/tags/4.6.0.zip       ; Version spécifique légère pour ATmega328P 
    bblanchon/ArduinoJson @ ^6.18.5 ; Pour la création du message JSON 
    # La bibliothèque AHT10 est incluse localement dans ton projet (.h/.cpp)
    # donc pas besoin de l'ajouter ici.

; Optimisations pour réduire la taille du programme (très important sur 328P)
build_flags = 
    -Os                             ; Optimise la taille du binaire
    -D DEBUG_OUT_ENABLE=1           ; Active les messages Serial si tu en as besoin 

; Réglages de monitoring pour voir tes logs Serial proprement
monitor_speed = 115200