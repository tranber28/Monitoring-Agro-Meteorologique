; PlatformIO Project Configuration File

[env:pro8MHzatmega328]
platform = atmelavr
board = pro8MHzatmega328
framework = arduino

lib_deps =
    mcci-catena/MCCI LoRaWAN LMIC library@^4.2.0

build_flags = 
    -Os
    -D DEBUG_OUT_ENABLE=1
    -D LMIC_LORAWAN_SPECIFIC
    -D ARDUINO_ARCH_AVR

monitor_speed = 115200
